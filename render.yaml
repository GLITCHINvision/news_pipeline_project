services:
  - type: web
    name: news-pulse-backend
    env: node
    rootDir: backend
    buildCommand: npm install && python -m venv .venv && .venv/bin/pip install -r requirements.txt
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard to your Vercel URL
