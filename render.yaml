services:
  - type: web
    name: news-pulse-backend
    env: node
    rootDir: backend

    buildCommand: |
      npm install
      python -m venv .venv
      .venv/bin/pip install -r requirements.txt

    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
